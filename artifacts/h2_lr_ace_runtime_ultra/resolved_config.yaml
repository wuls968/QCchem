molecule:
  name: H2-LR-ACE-runtime-probe
  geometry:
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.0
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.74
  charge: 0
  multiplicity: 1
  basis: sto3g
  unit: angstrom
problem:
  active_space: null
  freeze_core: false
  remove_orbitals: []
  compression:
    enabled: true
    method: modified_cholesky
    threshold: 1.0e-10
    max_rank: 4
    apply_to_solver: true
    execution_enabled: true
  measurement:
    strategy: low_rank_lr_ace_runtime
    runtime_precision_target: 0.015
    execution_mode: runtime_estimator
    grouping_policy: low_rank_factor_aware
  embedding:
    enabled: false
    method: dmet_skeleton
    bath_threshold: 0.05
    solver_plugin: placeholder_fragment_solver
    fragments: []
mapping:
  kind: parity_two_qubit_reduction
backend:
  kind: statevector
  shots: null
  precision: null
  seed: 1729
  repetitions: 1
  abelian_grouping: false
  noise:
    enabled: false
    profile: none
    depolarizing_probability_1q: 0.0
    depolarizing_probability_2q: 0.0
    readout_error_probability: 0.0
    basis_gates: []
  runtime:
    enabled: true
    service: ibm_quantum_platform
    instance: null
    runtime_ready: true
    session_ready: true
    batch_ready: false
    precision_target: 0.003
    max_budgeted_shots: 131072
    max_execution_seconds: 300.0
    calibration_strategy: lr_ace_h2_ultra_refinement
    resilience_level: 2
    grouping_policy: low_rank_factor_aware
    options:
      optimization_level: 3
      layout_strategy: min_weighted_error
      layout_method: sabre
      routing_method: sabre
      seed_transpiler: 1729
      submit_real_job: true
      wait_for_result: false
      requires_action_time_confirmation: true
      confirmation_message: LR-ACE exploratory Runtime probe may consume IBM quota.
      default_shots: 131072
      precision_target: 0.003
solver:
  kind: lr_ace
  optimizer:
    kind: COBYLA
    maxiter: 220
    tol: null
  ansatz:
    kind: lr_ace
    rotation_blocks:
    - ry
    - rz
    entanglement_blocks: cz
    entanglement: full
    reps: 1
    skip_final_rotation_layer: false
  initial_point: zeros
  experimental: true
benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 0.0016
  relative_error_threshold: 0.0016
mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: none
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder
  experimental: false
policy:
  name: hardware_ready
  allow_exploratory: true
exploratory:
  enabled: true
  modules:
  - lr_ace
  - runtime_probe
  notes:
  - Real submission must only be enabled after h2_lr_ace local chemical-accuracy gate
    passes.
  - hardware_verified does not imply chemistry validated.
tasks:
  excited_state:
    enabled: false
    method: exact_spectrum
    num_states: 2
    state_indices:
    - 1
  properties: []
  perturbative_correction:
    enabled: false
    method: nevpt2
    plugin: pyscf
    root: 0
hardware_optimization:
  enabled: false
  profile: h2_precision_push
  max_real_jobs: 3
  max_total_budgeted_shots: 40960
  max_total_estimated_quantum_seconds: 600.0
  stop_if_error_below: 0.0016
  candidate_strategies:
  - jw_puccd_layout_baseline
  - parity_puccd_layout
  - parity_succd_layout
  - parity_uccsd_layout
  selection_metric: accuracy_then_cost
  requires_confirmation: true
run:
  seed: 1729
  output_dir: /Users/a0000/QCchem/artifacts/h2_lr_ace_runtime_ultra
  overwrite: true
  exports:
    qcschema_json: true
    hdf5: true
