molecule:
  name: H2-LR-ACE
  geometry:
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.0
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.74
  charge: 0
  multiplicity: 1
  basis: sto3g
  unit: angstrom
problem:
  active_space: null
  freeze_core: false
  remove_orbitals: []
  compression:
    enabled: true
    method: modified_cholesky
    threshold: 1.0e-10
    max_rank: 4
    apply_to_solver: true
    execution_enabled: true
  measurement:
    strategy: low_rank_lr_ace_local
    runtime_precision_target: null
    execution_mode: estimator
    grouping_policy: low_rank_factor_aware
  embedding:
    enabled: false
    method: dmet_skeleton
    bath_threshold: 0.05
    solver_plugin: placeholder_fragment_solver
    fragments: []
mapping:
  kind: parity_two_qubit_reduction
backend:
  kind: statevector
  shots: null
  precision: null
  seed: 1729
  repetitions: 1
  abelian_grouping: true
  noise:
    enabled: false
    profile: none
    depolarizing_probability_1q: 0.0
    depolarizing_probability_2q: 0.0
    readout_error_probability: 0.0
    basis_gates: []
  runtime:
    enabled: false
    service: local
    instance: null
    runtime_ready: false
    session_ready: false
    batch_ready: false
    precision_target: null
    max_budgeted_shots: null
    max_execution_seconds: null
    calibration_strategy: default
    resilience_level: 0
    grouping_policy: default
    options: {}
solver:
  kind: lr_ace
  optimizer:
    kind: COBYLA
    maxiter: 220
    tol: null
  ansatz:
    kind: lr_ace
    rotation_blocks:
    - ry
    - rz
    entanglement_blocks: cz
    entanglement: full
    reps: 1
    skip_final_rotation_layer: false
  initial_point: zeros
  experimental: true
benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 0.0016
  relative_error_threshold: 0.0016
mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: placeholder
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder
  experimental: false
policy:
  name: benchmark
  allow_exploratory: true
exploratory:
  enabled: true
  modules:
  - lr_ace
  notes:
  - LR-ACE is a low-rank-factor-informed exploratory solver.
  - Local chemical-accuracy success does not imply publication-validated algorithm
    status.
tasks:
  excited_state:
    enabled: false
    method: exact_spectrum
    num_states: 2
    state_indices:
    - 1
  properties: []
  perturbative_correction:
    enabled: false
    method: nevpt2
    plugin: pyscf
    root: 0
hardware_optimization:
  enabled: false
  profile: h2_precision_push
  max_real_jobs: 3
  max_total_budgeted_shots: 40960
  max_total_estimated_quantum_seconds: 600.0
  stop_if_error_below: 0.0016
  candidate_strategies:
  - jw_puccd_layout_baseline
  - parity_puccd_layout
  - parity_succd_layout
  - parity_uccsd_layout
  selection_metric: accuracy_then_cost
  requires_confirmation: true
run:
  seed: 1729
  output_dir: artifacts/h2_lr_ace
  overwrite: true
  exports:
    qcschema_json: true
    hdf5: true
