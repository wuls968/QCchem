molecule:
  name: H2-shot
  geometry:
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.0
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.735
  charge: 0
  multiplicity: 1
  basis: sto3g
  unit: angstrom
problem:
  active_space: null
mapping:
  kind: jordan_wigner
backend:
  kind: shot_estimator
  shots: 4096
  precision: null
  seed: 101
  repetitions: 5
  abelian_grouping: false
solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 80
    tol: null
  ansatz:
    kind: uccsd
    rotation_blocks:
    - ry
    - rz
    entanglement_blocks: cz
    entanglement: full
    reps: 1
    skip_final_rotation_layer: false
  initial_point: zeros
benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 0.05
  relative_error_threshold: 0.05
mitigation:
  symmetry_check:
    enabled: true
    strategy: placeholder
  readout:
    enabled: false
    method: none
run:
  seed: 101
  output_dir: artifacts/h2_shot
  overwrite: true
