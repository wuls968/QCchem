molecule:
  name: H2-multitask
  geometry:
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.0
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 0.735
  charge: 0
  multiplicity: 1
  basis: sto3g
  unit: angstrom
problem:
  active_space: null
mapping:
  kind: jordan_wigner
backend:
  kind: shot_estimator
  shots: 8192
  precision: null
  seed: 909
  repetitions: 5
  abelian_grouping: false
solver:
  kind: exact
  optimizer:
    kind: COBYLA
    maxiter: 100
    tol: null
  ansatz:
    kind: twolocal
    rotation_blocks:
    - ry
    - rz
    entanglement_blocks: cz
    entanglement: full
    reps: 2
    skip_final_rotation_layer: false
  initial_point: zeros
benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-10
  relative_error_threshold: 1.0e-10
mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: placeholder
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder
policy:
  name: publication
tasks:
  excited_state:
    enabled: true
    method: vqd
    num_states: 2
    state_indices:
    - 1
  properties:
  - property_name: dipole_moment
    enabled: true
    method: exact_expectation
    state_indices:
    - 0
  - property_name: transition_dipole
    enabled: true
    method: placeholder
    state_indices:
    - 0
    - 1
  - property_name: oscillator_strength
    enabled: true
    method: placeholder
    state_indices:
    - 0
    - 1
run:
  seed: 41
  output_dir: artifacts/h2_multitask
  overwrite: true
