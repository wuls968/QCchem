molecule:
  name: LiH
  geometry:
  - symbol: Li
    coords:
    - 0.0
    - 0.0
    - 0.0
  - symbol: H
    coords:
    - 0.0
    - 0.0
    - 1.6
  charge: 0
  multiplicity: 1
  basis: sto3g
  unit: angstrom
problem:
  active_space: null
mapping:
  kind: bravyi_kitaev
backend:
  kind: statevector
  shots: null
  precision: null
solver:
  kind: exact
  optimizer:
    kind: COBYLA
    maxiter: 100
    tol: null
  ansatz:
    kind: twolocal
    rotation_blocks:
    - ry
    - rz
    entanglement_blocks: cz
    entanglement: full
    reps: 2
    skip_final_rotation_layer: false
  initial_point: zeros
benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-10
  relative_error_threshold: 1.0e-10
run:
  seed: 11
  output_dir: artifacts/lih
  overwrite: true
