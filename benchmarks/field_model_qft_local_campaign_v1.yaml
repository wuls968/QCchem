      tags: [cavity_qed, coupling_scan]
    - name: h2_cavity_pf_coupling_0p02
      kind: run
      config: configs/exploratory/h2_cavity_pf_exact.yaml
      expected_status: exploratory
      overrides:
        problem.cavity_qed.modes.0.coupling_strength: 0.02
      tags: [cavity_qed, coupling_scan]
    - name: h2_cavity_pf_coupling_0p05
