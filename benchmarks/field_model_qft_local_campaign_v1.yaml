      tags: [lattice_qed, trotter_step_scan]
    - name: h2_cavity_pf_exact_cutoff_1
      kind: run
      config: configs/exploratory/h2_cavity_pf_exact.yaml
      expected_status: exploratory
      tags: [cavity_qed, pauli_fierz, exact, cutoff_1]
    - name: h2_cavity_pf_exact_cutoff_2
      kind: run
