benchmark_suite:
  name: field_model_qft_hardware_micro_real_v1
  description: Guarded real IBM Runtime micro submission for a two-point H2 lattice-QED dynamics sanity check.
  registry_name: field_model_qft_hardware_micro_real_v1
  tags: [benchmark, exploratory, field_model, lattice_qed, hardware_micro, runtime_real]
  cases:
    - name: h2_lattice_qed_hardware_micro_real
      kind: run
      config: configs/exploratory/h2_lattice_qed_dynamics_runtime.yaml
      expected_status: exploratory
      overrides:
        problem.qft.dynamics.time_grid.stop: 1.0
        problem.qft.dynamics.time_grid.num_points: 11
        problem.qft.dynamics.runtime.time_point_indices: [0, 10]
        problem.qft.dynamics.runtime.observable_names: [particle_number, total_gauss_violation]
        problem.qft.dynamics.runtime.max_pub_count: 4
        problem.qft.dynamics.runtime.max_total_pub_shots: 2048
        problem.qft.dynamics.runtime.max_logical_depth: 200
        backend.runtime.max_budgeted_shots: 512
        backend.runtime.options:
          submit_real_job: true
          wait_for_result: false
          use_batch: true
          default_shots: 512
          backend_name: ibm_kingston
      tags: [lattice_qed, hardware_micro, runtime_real, budget_guarded]
