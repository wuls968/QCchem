molecule:
  name: H2-cudaq-sample
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.735]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

backend:
  kind: cudaq_sample
  shots: 4096
  seed: 711
  repetitions: 3
  abelian_grouping: false
  runtime:
    service: cudaq_local
    options:
      target: qpp-cpu
      fail_if_no_gpu: false

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 80
  ansatz:
    kind: uccsd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 5.0e-2
  relative_error_threshold: 5.0e-2

mitigation:
  symmetry_check:
    enabled: true
  readout:
    enabled: false
    method: none

run:
  seed: 711
  output_dir: artifacts/h2_cudaq_sample
  overwrite: true
