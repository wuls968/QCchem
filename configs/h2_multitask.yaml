molecule:
  name: H2-multitask
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.735]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

policy:
  name: publication

backend:
  kind: shot_estimator
  seed: 909
  shots: 8192
  repetitions: 5
  abelian_grouping: false

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-10
  relative_error_threshold: 1.0e-10

tasks:
  excited_state:
    enabled: true
    method: vqd
    num_states: 2
    state_indices: [1]
  properties:
    - property_name: dipole_moment
      method: exact_expectation
      state_indices: [0]
    - property_name: transition_dipole
      method: placeholder
      state_indices: [0, 1]
    - property_name: oscillator_strength
      method: placeholder
      state_indices: [0, 1]

mitigation:
  symmetry_check:
    strategy: parity_placeholder

run:
  seed: 41
  output_dir: artifacts/h2_multitask
  overwrite: true
