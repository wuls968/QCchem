molecule:
  name: LiH-nevpt2
  geometry:
    - symbol: Li
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 1.6]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  freeze_core: true
  active_space:
    selection_mode: manual
    num_electrons: 2
    num_spatial_orbitals: 2
    active_orbitals: [1, 2]

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-10
  relative_error_threshold: 1.0e-10

tasks:
  perturbative_correction:
    enabled: true
    method: nevpt2
    plugin: pyscf
    root: 0

run:
  seed: 47
  output_dir: artifacts/lih_nevpt2
  overwrite: true
