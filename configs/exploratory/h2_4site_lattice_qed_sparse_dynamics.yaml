molecule:
  name: H2-4site-lattice-QED-sparse-dynamics
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: real_space_lattice

policy:
  name: benchmark
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - lattice_qed
    - sparse_projected_engine
    - qft_dynamics
  notes:
    - "Sparse projected exact dynamics and Trotter comparison for a finite lattice-QED Hamiltonian."

problem:
  qft:
    enabled: true
    model: lattice_qed_minimal_coupling
    dimensions: 1
    grid:
      shape: [4]
      spacing: [0.75]
      origin: molecule_center
      axes: principal
      boundary: open
      softening: 0.35
    matter:
      spin_components: 1
      target_electrons: auto
      include_soft_coulomb_density: false
    gauge:
      group: u1
      electric_cutoff: 1
      coupling: 1.0
      include_magnetic_plaquettes: true
    constraints:
      gauss_law_penalty: 10.0
      particle_number_penalty: 10.0
      padding_penalty: 50.0
      enforce_physical_sector: true
      target_charge_sector: neutral
      gauss_law_tolerance: 1.0e-8
      max_sector_enumeration_qubits: 12
    ansatz:
      generator_policy: gauge_invariant_hopping
    engine:
      representation: sparse_projected
      auto_project_physical_sector: true
      max_projected_dimension: 4096
      max_full_qubits_for_dense: 10
      materialize_pauli: never
      store_basis_indices: full
      projector_tolerance: 1.0e-8
    dynamics:
      enabled: true
      method: real_time_quench
      initial_state:
        kind: local_hopping_pulse
        base: physical_reference
        link_index: 0
        pulse_time: 0.05
        pulse_strength: 1.0
      time_grid:
        start: 0.0
        stop: 1.0
        num_points: 21
      evolution:
        exact_enabled: true
        exact_qubit_limit: 12
        trotter_enabled: true
        trotter_step: 0.05
        trotter_order: 1
      runtime:
        enabled: false
        runtime_observables: aggregate_gauge
  measurement:
    strategy: lattice_qed_sparse_dynamics
    execution_mode: estimator
    grouping_policy: finite_cutoff_sparse_projected

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 2042

solver:
  kind: lattice_qed_sparse_exact
  experimental: true

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 0
  absolute_error_threshold: 1.0e-9
  relative_error_threshold: 1.0e-9

run:
  seed: 2042
  output_dir: artifacts/h2_4site_lattice_qed_sparse_dynamics
  overwrite: true
