molecule:
  name: H2-lattice-QED-VQE
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: real_space_lattice

policy:
  name: benchmark
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - lattice_qed
  notes:
    - "Finite-cutoff compact-U(1) lattice-QED VQE path."
    - "Exact baseline is the same discretized field Hamiltonian, not continuum chemistry."

problem:
  qft:
    enabled: true
    model: lattice_qed_minimal_coupling
    dimensions: 1
    grid:
      shape: [2]
      spacing: [0.75]
      origin: molecule_center
      axes: principal
      boundary: open
      softening: 0.35
    matter:
      spin_components: 2
      target_electrons: auto
      include_soft_coulomb_density: false
    gauge:
      group: u1
      electric_cutoff: 1
      coupling: 1.0
      include_magnetic_plaquettes: true
    constraints:
      gauss_law_penalty: 10.0
      particle_number_penalty: 10.0
      padding_penalty: 50.0
  measurement:
    strategy: lattice_qed_vqe
    execution_mode: estimator
    grouping_policy: finite_cutoff_field_terms

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 2027

solver:
  kind: vqe
  experimental: true
  optimizer:
    kind: COBYLA
    maxiter: 30
  ansatz:
    kind: twolocal
    rotation_blocks: [ry]
    entanglement_blocks: cz
    entanglement: linear
    reps: 1
    skip_final_rotation_layer: false
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 8
  absolute_error_threshold: 1.0e-2
  relative_error_threshold: 1.0e-2

run:
  seed: 2027
  output_dir: artifacts/h2_lattice_qed_vqe
  overwrite: true
