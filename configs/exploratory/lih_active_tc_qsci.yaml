molecule:
  name: LiH-active-tc-qsci
  geometry:
    - symbol: Li
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 1.6]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  freeze_core: true
  active_space:
    selection_mode: manual
    num_electrons: 2
    num_spatial_orbitals: 2
    active_orbitals: [1, 2]

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-8
  relative_error_threshold: 1.0e-8

policy:
  allow_exploratory: true

exploratory:
  enabled: true
  modules: [tc_qsci]
  notes:
    - TC-kicked QSCI is exploratory and should not be promoted to validated from this run alone.

tc_qsci:
  enabled: true
  cast_model:
    kind: identity
  initial_state:
    kind: cisd
  kick:
    time: 0.04
    num_kicks: 1
    pauli_term_budget: 12
    shots: 512
  selection:
    max_determinants: 8
    min_count: 1
    symmetry_postselect: true
  resource_estimation:
    enabled: true
    target_precision: 1.0e-3

run:
  seed: 23
  output_dir: artifacts/lih_active_tc_qsci
  overwrite: true
