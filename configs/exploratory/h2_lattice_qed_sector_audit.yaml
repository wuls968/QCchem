molecule:
  name: H2-lattice-QED-sector-audit
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: real_space_lattice

policy:
  name: benchmark
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - lattice_qed
  notes:
    - "Finite-cutoff compact-U(1) lattice-QED sector audit."

problem:
  qft:
    enabled: true
    model: lattice_qed_minimal_coupling
    dimensions: 1
    grid:
      shape: [2]
      spacing: [0.75]
      origin: molecule_center
      axes: principal
      boundary: open
      softening: 0.35
    matter:
      spin_components: 2
      target_electrons: auto
      include_soft_coulomb_density: false
    gauge:
      group: u1
      electric_cutoff: 1
      coupling: 1.0
      include_magnetic_plaquettes: true
    constraints:
      gauss_law_penalty: 10.0
      particle_number_penalty: 10.0
      padding_penalty: 50.0
      enforce_physical_sector: true
      target_charge_sector: neutral
      gauss_law_tolerance: 1.0e-8
      max_sector_enumeration_qubits: 8
    ansatz:
      generator_policy: gauge_invariant_hopping
  measurement:
    strategy: lattice_qed_sector_audit
    execution_mode: estimator
    grouping_policy: finite_cutoff_field_terms

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 2028

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 8
  absolute_error_threshold: 1.0e-9
  relative_error_threshold: 1.0e-9

run:
  seed: 2028
  output_dir: artifacts/h2_lattice_qed_sector_audit
  overwrite: true
