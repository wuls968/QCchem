molecule:
  name: H2-cavity-PF-VQE
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: benchmark
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - cavity_qed
    - pauli_fierz
  notes:
    - "Exploratory VQE on the finite photon-cutoff Pauli-Fierz H2 cavity Hamiltonian."

problem:
  cavity_qed:
    enabled: true
    model: pauli_fierz_cavity_qed
    photon_encoding: linear
    include_dipole_self_energy: true
    photon_physical_subspace_penalty: 25.0
    modes:
      - frequency: 0.4
        coupling_strength: 0.04
        polarization: [0.0, 0.0, 1.0]
        max_occupation: 1
  measurement:
    strategy: cavity_qed_vqe
    execution_mode: estimator
    grouping_policy: electron_photon_pauli

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 2142

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 60
  ansatz:
    kind: cavity_twolocal
    rotation_blocks: [ry, rz]
    entanglement_blocks: cz
    entanglement: linear
    reps: 1
    skip_final_rotation_layer: false
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 8
  absolute_error_threshold: 1.0
  relative_error_threshold: 1.0

run:
  seed: 2142
  output_dir: artifacts/h2_cavity_pf_vqe
  overwrite: true
