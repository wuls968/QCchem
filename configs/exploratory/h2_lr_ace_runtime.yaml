molecule:
  name: H2-LR-ACE-runtime-probe
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: hardware_ready
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - lr_ace
    - runtime_probe
  notes:
    - "Real submission must only be enabled after h2_lr_ace local chemical-accuracy gate passes."
    - "hardware_verified does not imply chemistry validated."

problem:
  compression:
    enabled: true
    method: modified_cholesky
    threshold: 1.0e-10
    max_rank: 4
    apply_to_solver: true
    execution_enabled: true
  measurement:
    strategy: low_rank_lr_ace_runtime
    runtime_precision_target: 0.015
    execution_mode: runtime_estimator
    grouping_policy: low_rank_factor_aware

mapping:
  kind: parity_two_qubit_reduction

backend:
  kind: statevector
  seed: 1729
  abelian_grouping: false
  runtime:
    enabled: true
    service: ibm_quantum_platform
    runtime_ready: true
    session_ready: true
    batch_ready: false
    precision_target: 0.015
    max_budgeted_shots: 4096
    max_execution_seconds: 300
    calibration_strategy: lr_ace_h2_micro_probe
    resilience_level: 2
    grouping_policy: low_rank_factor_aware
    options:
      optimization_level: 3
      layout_strategy: min_weighted_error
      layout_method: sabre
      routing_method: sabre
      seed_transpiler: 1729
      submit_real_job: false
      wait_for_result: false
      requires_action_time_confirmation: true
      confirmation_message: "LR-ACE exploratory Runtime probe may consume IBM quota."

solver:
  kind: lr_ace
  experimental: true
  optimizer:
    kind: COBYLA
    maxiter: 220
  ansatz:
    kind: lr_ace
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.6e-3
  relative_error_threshold: 1.6e-3

mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: none

run:
  seed: 1729
  output_dir: artifacts/h2_lr_ace_runtime
  overwrite: true
  exports:
    qcschema_json: true
    hdf5: true
