molecule:
  name: H2-tc-qsci
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.735]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-8
  relative_error_threshold: 1.0e-8

policy:
  allow_exploratory: true

exploratory:
  enabled: true
  modules: [tc_qsci]
  notes:
    - TC-kicked QSCI is an exploratory determinant-selection workflow.

tc_qsci:
  enabled: true
  cast_model:
    kind: identity
  initial_state:
    kind: hf
  kick:
    time: 0.05
    num_kicks: 1
    pauli_term_budget: 12
    shots: 512
  selection:
    max_determinants: 8
    min_count: 1
    symmetry_postselect: true
  resource_estimation:
    enabled: true
    target_precision: 1.0e-3

run:
  seed: 19
  output_dir: artifacts/h2_tc_qsci
  overwrite: true
