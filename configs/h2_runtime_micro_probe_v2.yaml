molecule:
  name: H2-runtime-micro-probe-v2
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: hardware_ready
  allow_exploratory: true

exploratory:
  enabled: true
  modules:
    - runtime_micro_probe
  notes:
    - "Micro probe verifies runtime submission/sidecar/collect provenance, not publication-grade chemistry accuracy."
    - "Submitting this config consumes IBM Runtime allocation and must be confirmed at action time."

problem:
  active_space: null
  measurement:
    strategy: default
    runtime_precision_target: 0.08
    execution_mode: runtime_estimator
    grouping_policy: default

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 727
  repetitions: 1
  abelian_grouping: false
  runtime:
    enabled: true
    service: ibm_quantum_platform
    runtime_ready: true
    session_ready: true
    batch_ready: false
    precision_target: 0.08
    max_budgeted_shots: 1024
    max_execution_seconds: 180
    calibration_strategy: runtime_micro_probe
    resilience_level: 1
    grouping_policy: default
    options:
      backend_name: ibm_kingston
      optimization_level: 3
      layout_strategy: min_weighted_error
      layout_method: sabre
      routing_method: sabre
      seed_transpiler: 727
      submit_real_job: true
      wait_for_result: false
      requires_action_time_confirmation: true
      confirmation_message: "This micro probe submits one real IBM Runtime job and may consume part of the monthly quota."

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 40
  ansatz:
    kind: puccd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 2.0e-1
  relative_error_threshold: 2.0e-1

mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: none
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder

tasks:
  excited_state: {}
  properties: []
  perturbative_correction: {}

run:
  seed: 727
  output_dir: artifacts/h2_runtime_micro_probe_v2
  overwrite: false
  exports:
    qcschema_json: true
    hdf5: true
