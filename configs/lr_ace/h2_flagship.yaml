molecule:
  name: H2-LR-ACE-flagship
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: benchmark

problem:
  measurement:
    strategy: low_rank_lr_ace_local
    execution_mode: estimator
    grouping_policy: low_rank_factor_aware

mapping:
  kind: parity_two_qubit_reduction

backend:
  kind: statevector
  seed: 1729

solver:
  kind: lr_ace
  lr_ace:
    profile: compact
    validation_mode: trust_first
    uncompressed_reference: auto
  optimizer:
    kind: COBYLA
    maxiter: 220
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.6e-3
  relative_error_threshold: 1.6e-3

run:
  seed: 1729
  output_dir: artifacts/h2_lr_ace_flagship
  overwrite: true
  exports:
    qcschema_json: true
    hdf5: true
