molecule:
  name: H2-cudaq-statevector
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.735]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

backend:
  kind: cudaq_statevector
  seed: 701
  runtime:
    service: cudaq_local
    options:
      target: qpp-cpu
      fail_if_no_gpu: false

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 100
  ansatz:
    kind: uccsd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-6
  relative_error_threshold: 1.0e-6

run:
  seed: 701
  output_dir: artifacts/h2_cudaq_statevector
  overwrite: true
