molecule:
  name: LiH-active-vqe-statevector-compressed
  geometry:
    - symbol: Li
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 1.6]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  freeze_core: true
  active_space:
    selection_mode: manual
    num_electrons: 2
    num_spatial_orbitals: 2
    active_orbitals: [1, 2]
  compression:
    enabled: true
    method: modified_cholesky
    threshold: 1.0e-3
    max_rank: 2
    execution_enabled: true

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 120
  ansatz:
    kind: uccsd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-2
  relative_error_threshold: 1.0e-2

run:
  seed: 79
  output_dir: artifacts/lih_active_vqe_statevector_compressed
  overwrite: true
