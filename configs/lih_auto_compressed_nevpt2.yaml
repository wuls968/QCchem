molecule:
  name: LiH-auto-compressed-nevpt2
  geometry:
    - symbol: Li
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 1.6]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  freeze_core: true
  active_space:
    selection_mode: auto
    num_spatial_orbitals: 2
    auto:
      enabled: true
      strategy: frontier_orbitals
      num_occupied: 1
      num_virtual: 1
  compression:
    enabled: true
    method: modified_cholesky
    threshold: 1.0e-3
    max_rank: 2
    execution_enabled: true

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 5.0e-3
  relative_error_threshold: 5.0e-3

tasks:
  perturbative_correction:
    enabled: true
    method: nevpt2
    plugin: pyscf
    root: 0

run:
  seed: 83
  output_dir: artifacts/lih_auto_compressed_nevpt2
  overwrite: true
  exports:
    qcschema_json: true
    hdf5: true
