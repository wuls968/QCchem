release_audit:
  profile: trust_first
  release_version: 0.1.0a1
  curated_artifacts:
    - name: h2_local_validated_anchor
      path: artifacts/h2/result.json
      required: true
    - name: lih_nevpt2_compression_anchor
      path: artifacts/lih_auto_compressed_nevpt2/result.json
      required: true
    - name: lih_cholesky_compression_anchor
      path: artifacts/lih_active_exact_compressed_cholesky/result.json
      required: true
    - name: benchmark_suite_v1
      path: artifacts/benchmark_suite_v1/benchmark_result.json
      required: true
    - name: mini_comparison_study
      path: artifacts/mini_comparison_study/study_result.json
      required: true
    - name: h2_short_scan
      path: artifacts/h2_short_scan/scan_result.json
      required: true
    - name: hardware_calibration_suite_v1
      path: artifacts/hardware_calibration_suite_v1/hardware_calibration_summary.json
      required: true
    - name: lr_ace_flagship_suite_v1
      path: artifacts/lr_ace_flagship_suite_v1/benchmark_result.json
      required: true
      acceptance_required: true
  exploratory_assets:
    - name: qft_sparse_projected_engine
      kind: qft
      config: configs/exploratory/h2_4site_lattice_qed_sparse_exact.yaml
      required: true
    - name: qft_realtime_dynamics
      kind: qft
      config: configs/exploratory/h2_4site_lattice_qed_sparse_dynamics.yaml
      required: true
    - name: lr_ace_h2_local_gate
      kind: lr_ace
      config: configs/exploratory/h2_lr_ace.yaml
      artifact: artifacts/h2_lr_ace/result.json
      required: true
    - name: lr_ace_lih_active_gate
      kind: lr_ace
      config: configs/exploratory/lih_active_lr_ace.yaml
      artifact: artifacts/lih_active_lr_ace/result.json
      required: true
    - name: tc_qsci_h2_exploratory
      kind: tc_qsci
      config: configs/exploratory/h2_tc_qsci.yaml
      required: true
  required_docs:
    - path: README.md
      terms: [QFT, LR-ACE, LR-ACE flagship, TC-QSCI, finite-cutoff, exploratory boundary, release audit]
      required: true
    - path: docs/verified_scope.md
      terms: [QFT, LR-ACE, LR-ACE flagship, TC-QSCI, finite-cutoff, exploratory boundary, release audit]
      required: true
    - path: docs/release_showcase.md
      terms: [QFT, LR-ACE, LR-ACE flagship, TC-QSCI, finite-cutoff, exploratory boundary, release audit]
      required: true
    - path: docs/release_audit.md
      terms: [release audit, release_readiness.json, release_readiness.md, no runtime submission]
      required: true
  acceptance_commands:
    - python -m pytest tests/unit/test_release_audit_v23.py -q
    - python -m pytest tests/integration/test_release_audit_workflow_v23.py -q
    - python -m pytest tests/integration/test_trust_first_release_v16.py -q
    - python -m pytest tests/integration/test_lattice_qed_workflow_v20.py tests/integration/test_lattice_qed_dynamics_workflow_v21.py tests/integration/test_lattice_qed_sparse_engine_workflow_v22.py -q
    - python -m pytest tests/integration/test_lr_ace_workflow_v19.py tests/integration/test_tc_qsci_workflow.py tests/integration/test_h2_workflow.py -q
    - qcchem benchmark run -c benchmarks/lr_ace_flagship_suite_v1.yaml -o artifacts/lr_ace_flagship_suite_v1
