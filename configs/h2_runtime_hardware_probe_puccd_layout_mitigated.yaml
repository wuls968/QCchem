molecule:
  name: H2-runtime-hardware-probe-puccd-layout-mitigated
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: publication

exploratory:
  enabled: false
  modules: []
  notes: []

problem:
  active_space: null
  measurement:
    strategy: default
    runtime_precision_target: 0.015
    execution_mode: runtime_estimator
    grouping_policy: default

mapping:
  kind: jordan_wigner

backend:
  kind: statevector
  seed: 929
  repetitions: 1
  abelian_grouping: false
  runtime:
    enabled: true
    service: ibm_quantum_platform
    runtime_ready: true
    session_ready: true
    batch_ready: false
    precision_target: 0.015
    max_budgeted_shots: 8192
    max_execution_seconds: 420
    calibration_strategy: chemical_accuracy_push
    resilience_level: 1
    grouping_policy: default
    options:
      backend_name: ibm_kingston
      optimization_level: 3
      layout_strategy: min_weighted_error
      layout_method: sabre
      routing_method: sabre
      seed_transpiler: 929
      submit_real_job: true
      wait_for_result: true
      estimator_options:
        dynamical_decoupling:
          enable: true
          sequence_type: XX
        twirling:
          enable_gates: true
          enable_measure: true
          num_randomizations: 32
          shots_per_randomization: 256
        resilience:
          measure_mitigation: true

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 40
  ansatz:
    kind: puccd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 2.0e-1
  relative_error_threshold: 2.0e-1

mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: none
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder

tasks:
  excited_state: {}
  properties: []
  perturbative_correction: {}

run:
  seed: 929
  output_dir: artifacts/h2_runtime_hardware_probe_puccd_layout_mitigated
  overwrite: true
