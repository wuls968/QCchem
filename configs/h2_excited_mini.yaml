molecule:
  name: H2-excited-mini
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.735]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

backend:
  kind: statevector

solver:
  kind: exact

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 1.0e-10
  relative_error_threshold: 1.0e-10

tasks:
  excited_state:
    enabled: true
    method: exact_spectrum
    num_states: 2
    state_indices: [1]

run:
  seed: 61
  output_dir: artifacts/h2_excited_mini
  overwrite: true
