molecule:
  name: H2-runtime-hardware-probe
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

problem:
  active_space: null

mapping:
  kind: jordan_wigner

policy:
  name: hardware_ready

exploratory:
  enabled: false
  modules: []
  notes: []

backend:
  kind: shot_estimator
  shots: 512
  repetitions: 1
  runtime:
    enabled: true
    runtime_ready: true
    session_ready: true
    options:
      backend_name: ibm_fez
      submit_real_job: true
      wait_for_result: true

solver:
  kind: exact
  optimizer:
    kind: COBYLA
    maxiter: 1
  ansatz:
    kind: twolocal
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 5.0e-2
  relative_error_threshold: 5.0e-2

mitigation:
  symmetry_check: {}
  readout: {}
  zne: {}
  pec: {}

tasks:
  excited_state: {}
  properties: []
  perturbative_correction: {}

run:
  seed: 303
  output_dir: artifacts/h2_runtime_hardware_probe
  overwrite: true
