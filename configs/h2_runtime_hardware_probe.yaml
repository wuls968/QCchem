molecule:
  name: H2-runtime-hardware-probe
  geometry:
    - symbol: H
      coords: [0.0, 0.0, 0.0]
    - symbol: H
      coords: [0.0, 0.0, 0.74]
  charge: 0
  multiplicity: 1
  basis: sto3g

policy:
  name: hardware_ready

exploratory:
  enabled: false
  modules: []
  notes: []

problem:
  active_space: null
  measurement:
    strategy: default
    runtime_precision_target: 0.15
    execution_mode: runtime_estimator
    grouping_policy: default

mapping:
  kind: jordan_wigner

backend:
  kind: shot_estimator
  shots: 512
  seed: 303
  repetitions: 1
  abelian_grouping: false
  runtime:
    enabled: true
    service: ibm_quantum_platform
    runtime_ready: true
    session_ready: true
    batch_ready: false
    precision_target: 0.15
    resilience_level: 0
    grouping_policy: default
    options:
      backend_name: ibm_marrakesh
      optimization_level: 1
      submit_real_job: true
      wait_for_result: true

solver:
  kind: vqe
  optimizer:
    kind: COBYLA
    maxiter: 40
  ansatz:
    kind: uccsd
    reps: 1
  initial_point: zeros

benchmark:
  enabled: true
  exact_baseline_qubit_limit: 12
  absolute_error_threshold: 5.0e-2
  relative_error_threshold: 5.0e-2

mitigation:
  symmetry_check:
    enabled: true
    strategy: parity_placeholder
  readout:
    enabled: false
    method: none
  zne:
    enabled: false
    method: placeholder
  pec:
    enabled: false
    method: placeholder

tasks:
  excited_state: {}
  properties: []
  perturbative_correction: {}

run:
  seed: 303
  output_dir: artifacts/h2_runtime_hardware_probe
  overwrite: true
